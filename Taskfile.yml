version: "3"

silent: true

tasks:
  default:
    desc: Run the binary in "dev mode".
    summary: |
      Run the binary for development needs.

      This command will build a development version of the tool before invoking it in
      the current shell environment. Do note, this will run an unoptimised version of
      the tool and is only useful during development.
    cmd: go run main.go

  install:
    internal: true
    desc: Install the dependencies for the project ONLY.
    sources:
      - go.mod
    generates:
      - go.sum
    cmds:
      - go mod download
      - go mod tidy

  setup:
    desc: Setup the project for development.
    summary: |
      Setup the project for development.

      This command will setup the project for local development. The command will
      abstract away installation of the dependencies of the project and its
      documentations as well.
    cmds:
      - task: install
      - task: docs:setup
      - task: setup:pre-commit

  setup:pre-commit:
    internal: true
    sources:
      - .pre-commit-config.yaml
    generates:
      - .git/hooks/pre-commit
      - .git/hooks/commit-msg
    cmd: pre-commit install --install-hooks --hook-type pre-commit --hook-type commit-msg

  build:
    desc: Build the binary for the current system architecture.
    summary: |
      Compile and build the binary.

      This command will compile the source code and build the binary for the current
      system architecture. Do note, it will not build the binary for the target
      architecture unless specified.
    vars:
      VERSION:
        sh: "git describe --tags --always --dirty"
      GIT_VERSION:
        sh: "git --version | awk '{print $3}'"
      GIT_COMMIT:
        sh: "git rev-parse --short HEAD"
      BUILD_DATE:
        sh: "date -u '+%Y-%m-%d'"
    cmd: |
      go build -ldflags "\
      -X github.com/weburz/terox/internal/version.version={{.VERSION}} \
      -X github.com/weburz/terox/internal/version.gitVersion={{.GIT_VERSION}} \
      -X github.com/weburz/terox/internal/version.gitCommit={{.GIT_COMMIT}} \
      -X github.com/weburz/terox/internal/version.buildDate={{.BUILD_DATE}}" \
      -o ./bin/terox
    sources:
      - "*.go"
    generates:
      - ./bin/terox

  docs:
    desc: Run the dev server for the docs.
    summary: |
      Run the dev server for the docs.

      This command will intelligently run the documentation's server from the
      appropriate directory. Use this command during development to work on the docs or
      use it for local reference.
    dir: ./docs
    cmd: pnpm dev

  docs:setup:
    desc: Install and setup the documentations.
    summary: |
      Setup the documentations.

      This command will setup the documentations before development on the project can
      be started. It will install all necessary dependencies and the prerequisites to
      document the project.
    dir: ./docs
    cmd: pnpm install --frozen-lockfile
    sources:
      - package.json
    generates:
      - pnpm-lock.json

  test:
    desc: Run the Go test suite.
    summary: |
      Run the Go test suite.

      This command runs every package's tests. Useful both during development and as
      a quick sanity check before opening a pull request.
    cmd: go test ./...

  clean:
    desc: Remove build artifacts produced by `task build` and the docs build.
    summary: |
      Remove build artifacts.

      Deletes the compiled binary under ./bin and the Nuxt build output under
      ./docs/.nuxt, ./docs/.output and ./docs/.data. Does not touch dependencies
      (node_modules) or the user-level terox template cache (use `terox clean` for
      that).
    cmds:
      - rm -rf ./bin
      - rm -rf ./docs/.nuxt ./docs/.output ./docs/.data

  clean:all:
    desc: Remove build artifacts AND dependency installs and caches. Slow to recover from.
    summary: |
      Remove build artifacts and dependency installs.

      Runs `task clean`, then additionally removes ./docs/node_modules and clears
      the Go test cache. Recovering requires `task setup` (network + disk). Use this
      only when you need a true cold start; reach for `task clean` for everyday use.
    cmds:
      - task: clean
      - rm -rf ./docs/node_modules
      - go clean -testcache
