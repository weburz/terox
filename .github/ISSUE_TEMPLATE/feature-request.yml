name: Feature Request
description: Suggest a feature request or an enhancement
title: "[ENHANCEMENT]: "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for recommending the enhancement!

  - type: textarea
    id: feature-enhancement
    attributes:
      label: Explain the feature
      description:
        Explain the enhancement or feature request you have in mind, in as much
        detail as possible.
      placeholder: Explain the feature and/or the enhancement in full detail.
      value: Implement XYZ feature which provides so and so capabilities to
        Terox...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why does this matter?
      description: What problem does this solve? What is the use case? Is there
        a workaround you are using today?
      placeholder: Today I have to do X manually every time, which is slow and
        error-prone. With this feature, ...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, approaches, or workarounds you have considered.
      placeholder: I looked at doing this via a shell wrapper, but...
    validations:
      required: false
